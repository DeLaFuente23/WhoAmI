<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Character</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --bg: #0a1221;
      --panel: rgba(9, 18, 34, 0.82);
      --line: rgba(188, 208, 255, 0.14);
      --text: #f7fbff;
      --muted: #a6bad5;
      --accent: #ff914d;
      --accent-soft: #ffc995;
      --cool: #6bc5ff;
      --glow: 0 30px 80px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      touch-action: manipulation;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(107, 197, 255, 0.15), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 145, 77, 0.18), transparent 24%),
        linear-gradient(180deg, #0a1221 0%, #101b33 52%, #09111d 100%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(20px);
      pointer-events: none;
      opacity: 0.4;
    }

    body::before {
      width: 180px;
      height: 180px;
      top: 4%;
      left: -40px;
      background: rgba(107, 197, 255, 0.18);
    }

    body::after {
      width: 220px;
      height: 220px;
      right: -50px;
      bottom: 3%;
      background: rgba(255, 145, 77, 0.16);
    }

    .screen {
      width: min(100%, 560px);
      min-height: calc(100vh - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: auto;
    }

    .card {
      width: 100%;
      position: relative;
      overflow: hidden;
      padding: 32px 24px;
      border-radius: 32px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--glow);
      text-align: center;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      right: -60px;
      top: -60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 145, 77, 0.26), transparent 70%);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(107, 197, 255, 0.12);
      color: var(--cool);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #title {
      margin: 18px 0 10px;
      font-size: clamp(1.8rem, 6vw, 2.9rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 28ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .instruction-panel {
      margin-top: 26px;
      display: grid;
      gap: 12px;
    }

    .instruction {
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid rgba(188, 208, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      text-align: left;
    }

    .instruction strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    .instruction span {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.94rem;
    }

    #character {
      display: none;
      margin: 0;
      width: 100%;
      max-width: 100%;
      font-size: clamp(2.2rem, 10vw, 5.2rem);
      line-height: 1;
      letter-spacing: -0.05em;
      color: #fff9f0;
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: auto;
      text-shadow: 0 10px 35px rgba(0, 0, 0, 0.28);
    }

    .reveal-mode .badge,
    .reveal-mode .subtitle,
    .reveal-mode .instruction-panel {
      display: none;
    }

    .reveal-mode .card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 40px);
      padding: 28px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 145, 77, 0.18), transparent 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        var(--panel);
    }

    .reveal-mode #title {
      display: none;
    }

    .reveal-mode #character {
      display: block;
    }

    @media (max-width: 520px) {
      body {
        display: block;
        padding: 16px;
      }

      .screen {
        width: 100%;
        min-height: calc(100vh - 32px);
      }

      .card {
        padding: 26px 18px;
        border-radius: 26px;
      }

      .instruction {
        padding: 14px 16px;
      }

      #character {
        font-size: clamp(1.95rem, 9vw, 3.6rem);
        letter-spacing: -0.045em;
      }

      .reveal-mode .card {
        min-height: calc(100vh - 32px);
      }
    }
  </style>
</head>
<body>
  <main class="screen" id="screen">
    <section class="card">
      <span class="badge">Character Screen</span>
      <h1 id="title"></h1>
      <p class="subtitle">Don't reveal your character until you're in position.</p>

      <div class="instruction-panel" id="container">
        <div class="instruction">
          <strong>Tap once</strong>
          <span>To reveal the character assigned to you.</span>
        </div>
        <div class="instruction">
          <strong>Double tap</strong>
          <span>To change to another character for the next round.</span>
        </div>
      </div>

      <h2 id="character"></h2>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const playerIndex = parseInt(params.get("player"));
    const totalPlayers = parseInt(params.get("total"));

    document.getElementById("title").innerText = `${name}, put your phone on your forehead.`;

    let playerPool = [];
    let currentIndex = 0;
    let isRevealed = false;

    async function setup() {
      const res = await fetch("characters.json");
      let characters = await res.json();

      characters = characters.sort(() => Math.random() - 0.5);

      const chunkSize = Math.ceil(characters.length / totalPlayers);
      playerPool = characters.slice(
        playerIndex * chunkSize,
        (playerIndex + 1) * chunkSize
      );
    }

    setup();

    document.body.addEventListener("click", () => {
      if (playerPool.length === 0) return;

      const screen = document.getElementById("screen");
      const charEl = document.getElementById("character");

      screen.classList.add("reveal-mode");
      charEl.innerText = playerPool[currentIndex];
      isRevealed = true;
    });

    let lastTap = 0;

    document.body.addEventListener("touchend", (event) => {
      const now = new Date().getTime();
      const timeSince = now - lastTap;

      if (timeSince < 300 && timeSince > 0 && playerPool.length > 0) {
        event.preventDefault();

        currentIndex = (currentIndex + 1) % playerPool.length;

        if (isRevealed) {
          document.getElementById("character").innerText = playerPool[currentIndex];
        }
      }

      lastTap = now;
    });
  </script>
</body>
</html>
