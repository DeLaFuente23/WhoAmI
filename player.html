<!DOCTYPE html>
<html>
<head>
  <title>Your Character</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
    }
  </style>
</head>
<body onclick="reveal()">

<div id="container">
  <h2 id="title"></h2>
  <p id="hint">(Tap anywhere to reveal)</p>
</div>

<h1 id="character" style="display:none;"></h1>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const char = params.get("char");

document.getElementById("title").innerText = `${name}, put phone on your forehead`;

function reveal() {
  // Hide instructions completely
  document.getElementById("container").style.display = "none";

  // Show only character
  const charEl = document.getElementById("character");
  charEl.innerText = char;
  charEl.style.display = "block";
}
</script>

</body>
</html>
