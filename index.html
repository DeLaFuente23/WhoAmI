<!DOCTYPE html>
<html>
<head>
  <title>Who Am I Game</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
    background: #111;
    color: white;
  }

  h1 {
    font-size: 8vw;
  }

  input {
    padding: 12px;
    width: 70%;
    font-size: 4vw;
    margin-bottom: 15px;
  }

  button {
    padding: 12px 18px;
    font-size: 4vw;
    margin: 5px;
    cursor: pointer;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    margin: 25px 0;
  }

  a {
    font-size: 5vw;
    color: #4da6ff;
    text-decoration: none;
  }

  img {
    margin-top: 15px;
    width: 50vw;
    max-width: 250px;
    height: auto;
  }
</style>
</head>
<body>

<h1>Who Am I 🎭</h1>

<input id="players" placeholder="Enter names separated by commas">
<br>

<button onclick="startGame()">Start Game</button>
<button onclick="resetGame()">Reset</button>

<ul id="links"></ul>

<script src="script.js"></script>

</body>
</html>
