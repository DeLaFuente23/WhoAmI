<!DOCTYPE html>
<html>
<head>
  <title>Your Character</title>

  <!-- Prevent zoom on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
      touch-action: manipulation; /* Helps prevent zoom gestures */
    }
  </style>
</head>
<body>

<div id="container">
  <h2 id="title"></h2>
  <p id="hint">(Tap to reveal • Double tap to change)</p>
</div>

<h1 id="character" style="display:none;"></h1>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

document.getElementById("title").innerText = `${name}, put phone on your forehead`;

let characters = [];
let currentChar = "";

// Load characters
async function loadCharacters() {
  const res = await fetch("characters.json");
  characters = await res.json();
}
loadCharacters();

function getRandomCharacter() {
  return characters[Math.floor(Math.random() * characters.length)];
}

// Tap = reveal
document.body.addEventListener("click", () => {
  if (!currentChar) {
    currentChar = getRandomCharacter();
  }

  document.getElementById("container").style.display = "none";

  const charEl = document.getElementById("character");
  charEl.innerText = currentChar;
  charEl.style.display = "block";
});

// Double tap = reroll
let lastTap = 0;

document.body.addEventListener("touchend", (event) => {
  const now = new Date().getTime();
  const timeSince = now - lastTap;

  if (timeSince < 300 && timeSince > 0) {
    event.preventDefault(); // 🚫 stops zoom

    currentChar = getRandomCharacter();
    document.getElementById("character").innerText = currentChar;
  }

  lastTap = now;
});
</script>

</body>
</html>
