<!DOCTYPE html>
<html>
<head>
  <title>Your Character</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
      touch-action: manipulation;
      background: #111;
      color: white;
    }

    #title {
      font-size: 6vw;
    }

    #hint {
      font-size: 4vw;
      opacity: 0.7;
    }

    #character {
      font-size: 12vw;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="container">
  <h2 id="title"></h2>
  <p id="hint">(Tap to reveal • Double tap to change)</p>
</div>

<h1 id="character" style="display:none;"></h1>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const playerIndex = parseInt(params.get("player"));
const totalPlayers = parseInt(params.get("total"));

document.getElementById("title").innerText = `${name}, put phone on your forehead`;

let playerPool = [];
let currentIndex = 0;

// Load and split characters
async function setup() {
  const res = await fetch("characters.json");
  let characters = await res.json();

  // Shuffle once
  characters = characters.sort(() => Math.random() - 0.5);

  // Split into chunks
  const chunkSize = Math.ceil(characters.length / totalPlayers);
  playerPool = characters.slice(
    playerIndex * chunkSize,
    (playerIndex + 1) * chunkSize
  );
}

setup();

// Tap = reveal
document.body.addEventListener("click", () => {
  if (playerPool.length === 0) return;

  document.getElementById("container").style.display = "none";

  const charEl = document.getElementById("character");
  charEl.innerText = playerPool[currentIndex];
  charEl.style.display = "block";
});

// Double tap = next character (no repeats)
let lastTap = 0;

document.body.addEventListener("touchend", (event) => {
  const now = new Date().getTime();
  const timeSince = now - lastTap;

  if (timeSince < 300 && timeSince > 0) {
    event.preventDefault();

    currentIndex = (currentIndex + 1) % playerPool.length;
    document.getElementById("character").innerText = playerPool[currentIndex];
  }

  lastTap = now;
});
</script>

</body>
</html>
